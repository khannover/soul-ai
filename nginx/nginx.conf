events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    types {
        application/javascript js mjs;
    }

    # localhost HTTP = secure context in browsers (mic, speech, SW) — no cert hassle
    server {
        listen 80;
        server_name localhost 127.0.0.1;
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/soul-ai-locations.conf;
    }

    # LAN / other hosts → HTTPS
    server {
        listen 80 default_server;
        server_name _;
        return 308 https://$host:8443$request_uri;
    }

    server {
        listen 443 ssl default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/certs/soul-ai.pem;
        ssl_certificate_key /etc/nginx/certs/soul-ai-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/snippets/soul-ai-locations.conf;
    }
}